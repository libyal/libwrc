[project]
description: "libwrc is a library to access the Windows Resource Compiler (WRC) format."
name: "libwrc"
status: "experimental"
year_of_creation: "2011"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
description: "Library to access the Windows Resource Compiler (WRC) format"
features: ["pthread", "wide_character_type"]
public_types: ["manifest_resource", "message_table_resource", "mui_resource", "resource", "resource_item", "stream", "string_table_resource", "version_information_resource"]

[tools]
description: "Several tools for reading Windows Resource (RC) files"
names: ["wrcinfo"]

[info_tool]
source_description: "a Windows Resource (RC) stream of the .rsrc section of a MZ, PE/COFF executable"
source_type: "file"

[tests]
profiles: ["libwrc", "pywrc", "wrcinfo"]
option_sets: ["virtual_address"]
info_tool_options_per_profile: [""]
info_tool_profiles: ["wrcinfo"]
example_filename1: "ntbackup.exe"
example_filename2: "adtschema.dll"

[troubleshooting]
example: "wrcinfo adtschema.dll"

